---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: ubuntu
    image: ubuntu:22.04
    command: /bin/bash -c "while true; do sleep 10000; done"
    privileged: true
    pre_build_image: true

  - name: oraclelinux
    image: oraclelinux:8
    command: /bin/bash -c "while true; do sleep 10000; done"
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible
  config_options:
    defaults:
      remote_tmp: /tmp

verifier:
  name: ansible