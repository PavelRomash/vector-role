- name: Install dependencies
  package:
    name:
      - curl
    state: present

- name: Download Vector install script
  get_url:
    url: https://sh.vector.dev
    dest: /tmp/vector.sh
    mode: "0755"

- name: Install Vector
  command: bash /tmp/vector.sh -y
  args:
    creates: /usr/bin/vector

- name: Create config directory
  file:
    path: /etc/vector
    state: directory
    mode: "0755"

- name: Deploy Vector config
  template:
    src: vector.toml.j2
    dest: "{{ vector_config_path }}"
  notify: restart vector